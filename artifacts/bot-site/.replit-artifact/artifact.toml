kind = "web"
previewPath = "/"
title = "Bot Site"
version = "1.0.0"
id = "artifacts/bot-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18148

[services.development]
run = "pnpm --filter @workspace/bot-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bot-site", "run", "build" ]
publicDir = "artifacts/bot-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18148"
BASE_PATH = "/"
